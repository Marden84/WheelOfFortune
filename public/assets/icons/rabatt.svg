<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Sofa body -->
  <rect x="8" y="28" width="48" height="22" rx="4" fill="white" opacity="0.9"/>
  <!-- Back cushion -->
  <rect x="8" y="20" width="48" height="12" rx="4" fill="white" opacity="0.8"/>
  <!-- Arm rests -->
  <rect x="4" y="28" width="10" height="18" rx="4" fill="white" opacity="0.85"/>
  <rect x="50" y="28" width="10" height="18" rx="4" fill="white" opacity="0.85"/>
  <!-- Legs -->
  <rect x="14" y="50" width="6" height="8" rx="2" fill="white" opacity="0.7"/>
  <rect x="44" y="50" width="6" height="8" rx="2" fill="white" opacity="0.7"/>
  <!-- Cushion divider -->
  <line x1="32" y1="28" x2="32" y2="50" stroke="#F47920" stroke-width="2" opacity="0.5"/>
  <!-- -10% badge -->
  <circle cx="50" cy="16" r="10" fill="#E2001A"/>
  <text x="50" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">-10%</text>
</svg>
