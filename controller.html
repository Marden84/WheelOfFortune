<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E2001A">
  <title>Conforama Glücksrad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --red: #E2001A; }

    html, body {
      height: 100%;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      overflow: hidden;
    }

    .header {
      background: var(--red);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 64px;
      flex-shrink: 0;
    }
    .header img {
      height: 36px;
      filter: brightness(0) invert(1);
    }

    .screen {
      position: fixed;
      top: 64px; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
      text-align: center;
      transition: opacity 0.25s ease;
    }
    .screen.hidden { display: none; }

    /* ── Connecting ── */
    .spinner {
      width: 60px; height: 60px;
      border: 5px solid #ddd;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text { font-size: 1.2rem; color: #555; font-weight: 500; }

    /* ── Ready ── */
    .wheel-emoji { font-size: 5rem; animation: bounce 1.5s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .main-title { font-size: 2.2rem; font-weight: 800; color: #1a1a1a; line-height: 1.2; }
    .main-sub { font-size: 1.1rem; color: #666; }

    /* ── Spinning ── */
    .spin-anim {
      width: 90px; height: 90px;
      border: 6px solid #ddd;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    /* ── Buttons ── */
    .btn {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      padding: 22px 60px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(226,0,26,0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      min-width: 240px;
    }
    .btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(226,0,26,0.3); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn.grey { background: #666; box-shadow: none; font-size: 1.1rem; padding: 16px 40px; }

    /* ── Result ── */
    #screenResult {
      position: fixed;
      top: 64px; left: 0; right: 0; bottom: 0;
    }

    .confetti-layer {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .result-card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.93);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 340px;
      width: calc(100% - 48px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    @keyframes pop-in {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .result-icon { width: 90px; height: 90px; }
    .result-msg {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a1a;
      white-space: pre-line;
      line-height: 1.4;
      text-align: center;
    }

    /* ── Error ── */
    .error-emoji { font-size: 4rem; }
    .reload-btn { background: #555; font-size: 1rem; padding: 14px 36px; }
  </style>
</head>
<body>
  <header class="header">
    <img src="./public/assets/logo.svg" alt="Conforama">
  </header>

  <!-- Connecting -->
  <div class="screen" id="screenConnecting">
    <div class="spinner"></div>
    <p class="status-text">Verbinde…</p>
  </div>

  <!-- Ready -->
  <div class="screen hidden" id="screenReady">
    <div class="wheel-emoji">🎡</div>
    <h1 class="main-title">Dein Glück wartet!</h1>
    <p class="main-sub">Drück den Knopf und dreh das Rad</p>
    <button class="btn" id="spinBtn">DREHEN!</button>
  </div>

  <!-- Spinning -->
  <div class="screen hidden" id="screenSpinning">
    <div class="spin-anim"></div>
    <p class="status-text">Das Rad dreht sich…</p>
  </div>

  <!-- Result -->
  <div class="screen hidden" id="screenResult">
    <canvas class="confetti-layer" id="confettiCanvas"></canvas>
    <div class="result-card">
      <img class="result-icon" id="resultIcon" src="" alt="">
      <p class="result-msg" id="resultMsg"></p>
    </div>
  </div>

  <!-- Retry -->
  <div class="screen hidden" id="screenRetry">
    <div class="wheel-emoji">🎉</div>
    <h1 class="main-title">Nochmal drehen!</h1>
    <p class="main-sub">Du hast einen Extra-Spin gewonnen!</p>
    <button class="btn" id="retryBtn">NOCHMAL!</button>
  </div>

  <!-- Error -->
  <div class="screen hidden" id="screenError">
    <div class="error-emoji">😕</div>
    <p class="status-text" id="errorText">Verbindungsfehler</p>
    <button class="btn grey" onclick="location.reload()">Neu laden</button>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="./public/assets/confetti.js"></script>
  <script>
    'use strict';

    // ── State machine ─────────────────────────────────────────────────
    const SCREENS = ['Connecting', 'Ready', 'Spinning', 'Result', 'Retry', 'Error'];

    function show(name) {
      SCREENS.forEach(s => {
        const el = document.getElementById('screen' + s);
        if (el) el.classList.toggle('hidden', s !== name);
      });
    }

    // ── Get peer ID from URL ──────────────────────────────────────────
    const hostId = new URLSearchParams(window.location.search).get('peer');
    if (!hostId) {
      show('Error');
      document.getElementById('errorText').textContent = 'Ungültiger QR-Code. Bitte neu scannen.';
    }

    // ── Confetti canvas resize ────────────────────────────────────────
    const confettiCanvas = document.getElementById('confettiCanvas');
    function resizeConfetti() {
      const el = document.getElementById('screenResult');
      confettiCanvas.width = el.clientWidth || window.innerWidth;
      confettiCanvas.height = el.clientHeight || window.innerHeight;
    }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    // ── PeerJS ────────────────────────────────────────────────────────
    let conn = null;
    const peer = new Peer();

    peer.on('open', () => {
      if (!hostId) return;
      conn = peer.connect(hostId, { reliable: true, serialization: 'json' });

      conn.on('open', () => {
        // Wait for 'ready' from screen
      });

      conn.on('data', data => {
        if (data.type === 'ready') {
          show('Ready');

        } else if (data.type === 'spin-start') {
          show('Spinning');

        } else if (data.type === 'result') {
          resizeConfetti();
          document.getElementById('resultIcon').src = data.segment.iconPath;
          document.getElementById('resultIcon').alt = data.segment.label.replace('\n', ' ');
          document.getElementById('resultMsg').textContent =
            data.isWin ? data.message : 'Leider nichts gewonnen 😔';
          show('Result');
          if (data.isWin) confetti.launch(confettiCanvas);

        } else if (data.type === 'retry') {
          show('Retry');

        } else if (data.type === 'error') {
          document.getElementById('errorText').textContent = data.message;
          show('Error');
        }
      });

      conn.on('close', () => {
        if (document.getElementById('screenResult').classList.contains('hidden') &&
            document.getElementById('screenError').classList.contains('hidden')) {
          document.getElementById('errorText').textContent = 'Verbindung getrennt. Bitte neu scannen.';
          show('Error');
        }
      });

      conn.on('error', () => {
        document.getElementById('errorText').textContent = 'Verbindungsfehler. Bitte neu scannen.';
        show('Error');
      });
    });

    peer.on('error', err => {
      document.getElementById('errorText').textContent =
        err.type === 'peer-unavailable'
          ? 'Screen nicht erreichbar. Ist der Screen geöffnet?'
          : 'Verbindungsfehler: ' + err.type;
      show('Error');
    });

    // ── Buttons ───────────────────────────────────────────────────────
    document.getElementById('spinBtn').addEventListener('click', () => {
      if (!conn || !conn.open) return;
      conn.send({ type: 'spin' });
      show('Spinning');
    });

    document.getElementById('retryBtn').addEventListener('click', () => {
      if (!conn || !conn.open) return;
      conn.send({ type: 'spin' });
      show('Spinning');
    });
  </script>
</body>
</html>
